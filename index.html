<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anscom Finance | Institutional Terminal</title>
    
    <!-- Fonts: Inter (UI) & JetBrains Mono (Data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- GSAP Animation Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            /* DARK THEME (NASDAQ STYLE) */
            --bg-body: #050505;
            --bg-card: #121212;
            --bg-panel: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent-gold: #D4AF37;
            --accent-blue: #007AFF; /* Nasdaq Blue */
            --border-color: #2C2C2E;
            --success: #30D158;
            --danger: #FF453A;
            
            --font-ui: 'Inter', sans-serif;
            --font-data: 'JetBrains Mono', monospace;
            
            --nav-height: 60px;
            --ticker-height: 46px;
        }

        /* LIGHT THEME */
        body.light-theme {
            --bg-body: #F2F2F7;
            --bg-card: #FFFFFF;
            --bg-panel: #F9F9F9;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-color: #D1D1D6;
            --accent-blue: #0056D2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: var(--font-ui);
            overflow-x: hidden;
            /* Subtle Grid Pattern */
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
        }

        /* =========================================
           1. INTRO / SECURITY LAYER (Mobile Friendly)
           ========================================= */
        #intro-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .intro-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Warning Box */
        .security-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            font-family: var(--font-data);
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .intro-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 16px;
            font-family: var(--font-data);
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .btn:active { transform: scale(0.98); }
        .btn-primary:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

        /* Welcome Text */
        #step-welcome { display: none; }
        .welcome-text {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* =========================================
           2. MAIN APP STRUCTURE
           ========================================= */
        #app-container {
            opacity: 0; /* Hidden until intro done */
            padding-bottom: 40px;
        }

        /* Ticker Tape */
        #ticker-tape {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--ticker-height);
            background: var(--bg-body);
            border-bottom: 1px solid var(--border-color);
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: var(--nav-height);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: var(--ticker-height);
            z-index: 90;
        }

        .brand-logo {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }
        .brand-logo span { color: var(--accent-gold); }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .clock-widget {
            font-family: var(--font-data);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: none; /* Hidden on tiny mobile */
        }

        .theme-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
        }

        /* =========================================
           3. DASHBOARD GRID (Responsive)
           ========================================= */
        .dashboard-grid {
            max-width: 1440px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            gap: 15px;
            /* Default Mobile: 1 Column */
            grid-template-columns: 1fr;
        }

        /* Card Styling */
        .market-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2px; /* Slight inner border look */
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-label {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: var(--bg-panel);
            padding: 4px 8px;
            font-size: 0.7rem;
            font-family: var(--font-data);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            pointer-events: none; /* Let clicks pass through to chart */
        }

        /* HEIGHTS CONFIGURATION */
        /* Mobile Heights (Optimized for scrolling) */
        .card-hero { height: 400px; }
        .card-standard { height: 350px; }

        /* Desktop Layout (Tablets & Up) */
        @media (min-width: 768px) {
            .dashboard-grid {
                /* 2 Columns */
                grid-template-columns: 1fr 1fr;
                padding: 0 20px;
            }
            .card-hero {
                grid-column: 1 / -1; /* Full width */
                height: 550px;
            }
            .card-standard {
                height: 450px;
            }
            .clock-widget { display: block; }
        }

        /* Large Desktop */
        @media (min-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            /* Row 1: Gold (2/3 width) + Silver (1/3 width) */
            .card-hero { grid-column: span 2; height: 600px; }
            #silver-section { grid-column: span 1; height: 600px; }
            
            /* Row 2: Nifty, Dow, Nasdaq */
            .card-standard { height: 400px; }
        }

        /* TradingView Fixes */
        .tradingview-widget-container { width: 100%; height: 100%; }

        /* Footer */
        .footer-bar {
            text-align: center;
            font-family: var(--font-data);
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 20px;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <!-- =======================
         1. SECURITY INTRO
         ======================= -->
    <div id="intro-layer">
        
        <!-- STEP 1: VERIFICATION -->
        <div id="step-verify" class="intro-container">
            <div class="security-badge">Secure Connection Request</div>
            <h2 class="intro-title">Identity Verification Required</h2>
            <p style="color:var(--text-secondary); margin-bottom:20px; font-size: 0.9rem;">
                Are you <strong>Deepak Singh</strong>?
            </p>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="verifyIdentity(true)">Yes</button>
                <button class="btn btn-danger" onclick="verifyIdentity(false)">No</button>
            </div>
        </div>

        <!-- STEP 2: WELCOME -->
        <div id="step-welcome" class="intro-container">
            <div id="welcome-message" class="welcome-text"></div>
            <p style="font-family: var(--font-data); color: var(--accent-gold); margin-top: 10px;">
                > INITIALIZING MARKET DATA...
            </p>
        </div>

    </div>

    <!-- =======================
         2. MAIN APPLICATION
         ======================= -->
    <div id="app-container">
        
        <!-- TICKER TAPE -->
        <div id="ticker-tape">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {
                    "symbols": [
                        { "proName": "COMEX:GC1!", "title": "Gold Futures" },
                        { "proName": "COMEX:SI1!", "title": "Silver Futures" },
                        { "proName": "NSE:NIFTY", "title": "Nifty 50" },
                        { "proName": "FX_IDC:USDINR", "title": "USD/INR" },
                        { "proName": "DJ:DJI", "title": "Dow Jones" }
                    ],
                    "showSymbolLogo": true,
                    "colorTheme": "dark",
                    "isTransparent": false,
                    "displayMode": "adaptive",
                    "locale": "en"
                }
                </script>
            </div>
        </div>

        <!-- NAVBAR -->
        <nav>
            <div class="brand-logo">Anscom <span>Finance</span></div>
            <div class="nav-actions">
                <div class="clock-widget" id="live-clock">--:-- IST</div>
                <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">☀</button>
            </div>
        </nav>

        <!-- DASHBOARD GRID -->
        <div class="dashboard-grid">
            
            <!-- 1. GOLD (Primary Hero) -->
            <div class="market-card card-hero">
                <div class="card-label">GOLD (XAUUSD)</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                        "symbols": [["OANDA:XAUUSD|1D"]],
                        "chartOnly": false,
                        "width": "100%",
                        "height": "100%",
                        "locale": "en",
                        "colorTheme": "dark",
                        "autosize": true,
                        "showVolume": false,
                        "showMA": false,
                        "hideDateRanges": false,
                        "hideMarketStatus": false,
                        "scalePosition": "right",
                        "scaleMode": "Normal",
                        "fontFamily": "Inter, sans-serif",
                        "fontSize": "10",
                        "valuesTracking": "1",
                        "changeMode": "price-and-percent",
                        "chartType": "area",
                        "lineWidth": 2,
                        "upColor": "#22ab94",
                        "downColor": "#f7525f",
                        "backgroundColor": "rgba(0,0,0,0)"
                    }
                    </script>
                </div>
            </div>

            <!-- 2. SILVER -->
            <div class="market-card card-standard" id="silver-section">
                <div class="card-label">SILVER (XAGUSD)</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                        "symbols": [["OANDA:XAGUSD|1D"]],
                        "chartOnly": false,
                        "width": "100%",
                        "height": "100%",
                        "locale": "en",
                        "colorTheme": "dark",
                        "autosize": true,
                        "showVolume": false,
                        "hideDateRanges": true, 
                        "scalePosition": "right",
                        "fontFamily": "Inter, sans-serif",
                        "chartType": "area",
                        "backgroundColor": "rgba(0,0,0,0)"
                    }
                    </script>
                </div>
            </div>

            <!-- 3. NIFTY 50 -->
            <div class="market-card card-standard">
                <div class="card-label">NIFTY 50 (NSE)</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                        "symbols": [["NSE:NIFTY|1D"]],
                        "chartOnly": false,
                        "width": "100%",
                        "height": "100%",
                        "locale": "en",
                        "colorTheme": "dark",
                        "autosize": true,
                        "showVolume": false,
                        "hideDateRanges": true,
                        "scalePosition": "right",
                        "fontFamily": "Inter, sans-serif",
                        "chartType": "area",
                        "backgroundColor": "rgba(0,0,0,0)"
                    }
                    </script>
                </div>
            </div>

            <!-- 4. DOW JONES -->
            <div class="market-card card-standard">
                <div class="card-label">DOW JONES (US)</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                        "symbols": [["DJ:DJI|1D"]],
                        "chartOnly": false,
                        "width": "100%",
                        "height": "100%",
                        "locale": "en",
                        "colorTheme": "dark",
                        "autosize": true,
                        "showVolume": false,
                        "hideDateRanges": true,
                        "scalePosition": "right",
                        "fontFamily": "Inter, sans-serif",
                        "chartType": "area",
                        "backgroundColor": "rgba(0,0,0,0)"
                    }
                    </script>
                </div>
            </div>

             <!-- 5. NASDAQ -->
             <div class="market-card card-standard">
                <div class="card-label">NASDAQ (NDX)</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                        "symbols": [["NASDAQ:NDX|1D"]],
                        "chartOnly": false,
                        "width": "100%",
                        "height": "100%",
                        "locale": "en",
                        "colorTheme": "dark",
                        "autosize": true,
                        "showVolume": false,
                        "hideDateRanges": true,
                        "scalePosition": "right",
                        "fontFamily": "Inter, sans-serif",
                        "chartType": "area",
                        "backgroundColor": "rgba(0,0,0,0)"
                    }
                    </script>
                </div>
            </div>

        </div>

        <div class="footer-bar">
            SYSTEM STATUS: OPERATIONAL | ANSCOM FINANCE
        </div>
    </div>

    <!-- LOGIC -->
    <script>
        // --- CLOCK ---
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-clock').innerText = time + " IST";
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- THEME ---
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            document.querySelector('.theme-btn').innerText = isLight ? "☾" : "☀";
        }

        // --- INTRO SEQUENCE (GSAP) ---
        function verifyIdentity(isDeepak) {
            // 1. Fade out Verify Box
            gsap.to("#step-verify", {
                opacity: 0,
                y: -20,
                duration: 0.4,
                onComplete: () => {
                    document.getElementById("step-verify").style.display = "none";
                    document.getElementById("step-welcome").style.display = "block";
                    
                    // Set Greeting
                    const name = isDeepak ? "Deepak Singh" : "Guest User";
                    const greeting = isDeepak ? "Welcome Back" : "Access Granted";
                    document.getElementById("welcome-message").innerHTML = `${greeting},<br>${name}.`;

                    // 2. Show Welcome
                    gsap.fromTo("#step-welcome", 
                        { opacity: 0, scale: 0.9 },
                        { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.7)" }
                    );

                    // 3. Launch Dashboard after delay
                    setTimeout(launchDashboard, 2000);
                }
            });
        }

        function launchDashboard() {
            // Slide up the black curtain
            gsap.to("#intro-layer", {
                y: "-100%",
                duration: 1.0,
                ease: "expo.inOut",
                onComplete: () => { document.getElementById("intro-layer").style.display = "none"; }
            });

            // Reveal App
            const app = document.getElementById("app-container");
            app.style.opacity = 1;

            // Staggered Entrance for Cards
            gsap.from(".market-card", {
                y: 60,
                opacity: 0,
                duration: 1,
                stagger: 0.1,
                ease: "power3.out",
                delay: 0.4
            });

            // Navbar slide down
            gsap.from("nav", { y: -50, opacity: 0, duration: 0.8, delay: 0.2 });
        }
    </script>
</body>
</html>
