<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anscom Finance | Global Market Intelligence</title>
    
    <!-- Google Fonts: Inter for that clean Financial Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- GSAP for World-Class Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0F0F0F;
            --accent-gold: #D4AF37;
            --text-main: #EAEAEA;
            --text-muted: #888888;
            --border-color: #222222;
            --up-color: #22ab94;
            --down-color: #f7525f;
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- Ticker Tape Section --- */
        #ticker-tape {
            width: 100%;
            height: 46px; /* Fixed height for standard TV ticker */
            position: sticky;
            top: 0;
            z-index: 200;
            background: #000;
            border-bottom: 1px solid var(--border-color);
            transform: translateY(-100%); /* Hidden initially */
        }

        /* --- Header / Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 100;
            opacity: 0; /* Hidden initially */
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .brand span {
            color: var(--accent-gold);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--up-color);
            font-weight: 600;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--up-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* --- Layout Grid --- */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Widget Container Styling */
        .market-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            opacity: 0; 
            transform: translateY(50px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Specific Sizes */
        .hero-section {
            height: 600px;
        }

        .split-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 500px;
        }

        .lower-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 400px;
        }

        /* TradingView Specific Overrides */
        .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 171, 148, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 171, 148, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 171, 148, 0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .split-section, .lower-section {
                grid-template-columns: 1fr;
                height: auto;
            }
            .hero-section, .market-card {
                height: 400px;
            }
            nav {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 1. SCROLLING TICKER TAPE (COMEX LIVE DATA) -->

        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>

                "proName": "COMEX:GC1!",
                "title": "Gold Futures"

                {

            "showSymbolLogo": true,
            "colorTheme": "dark",

    </div>

                    "locale": "en",

                    "autosize": true,
                    "showVolume": false,
                    "showMA": false,
                    "hideDateRanges": false,
                    "hideMarketStatus": false,
                    "hideSymbolLogo": false,
                    "scalePosition": "right",
                    "scaleMode": "Normal",
                    "fontFamily": "Inter, -apple-system, BlinkMacSystemFont, sans-serif",

        <div class="lower-section">
            <div class="market-card" id="card-us1">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>

    </div>

    <footer>
        <p>© 2024 Anscom Finance. Professional Data Feeds.</p>
    </footer>

    <!-- ANIMATION LOGIC -->
    <script>
        document.addEventListener("DOMContentLoaded", (event) => {
            gsap.registerPlugin();

            const tl = gsap.timeline();

            // 1. Ticker Tape slides down from top
            tl.to("#ticker-tape", {
                y: 0,
                duration: 0.8,
                ease: "power3.out"
            })
            // 2. Navbar fades in gently
            .to("#navbar", {
                opacity: 1,
                duration: 0.5
            }, "-=0.3")
            // 3. Hero Gold Chart scales up
            .to("#card-gold", {
                opacity: 1,
                y: 0,
                duration: 1.0,
                ease: "expo.out",
            }, "-=0.2")
            // 4. Staggered Pop-up for remaining cards
            .to([
                "#card-silver", 
                "#card-nifty", 
                "#card-us1", 
                "#card-us2"
            ], {
                opacity: 1,
                y: 0,
                duration: 0.8,
                stagger: 0.15,
                ease: "back.out(1.2)"
            }, "-=0.6");
        });
    </script>
</body>
</html>
